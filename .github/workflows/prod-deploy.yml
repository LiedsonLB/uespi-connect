name: Deploy UESPI Connect

on:
  push:
    branches: [ main ]

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
  VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
  VITE_LIVEKIT_URL: ${{ secrets.VITE_LIVEKIT_URL }}

jobs:

# ===============================
# BUILD + PUSH IMAGES
# ===============================
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      # FRONTEND
      - name: Build Frontend
        working-directory: ./frontend
        run: |
          docker build \
          --build-arg VITE_GOOGLE_CLIENT_ID=${{ env.VITE_GOOGLE_CLIENT_ID }} \
          --build-arg VITE_LIVEKIT_URL=ws://177.136.252.12:7880 \
          -t $DOCKERHUB_USERNAME/uespi-frontend:latest .
          docker push $DOCKERHUB_USERNAME/uespi-frontend:latest
          
      # BACKEND NODE
      - name: Build Backend
        working-directory: ./backend
        run: |
          docker build -t $DOCKERHUB_USERNAME/uespi-backend:latest .
          docker push $DOCKERHUB_USERNAME/uespi-backend:latest


# ===============================
# DEPLOY SERVER
# ===============================
  deploy:
    needs: build-and-push
    runs-on: self-hosted

    steps:

      - uses: actions/checkout@v4

      - name: Criar network
        run: docker network create uespi_net || true

      - name: Criar volumes
        run: |
          docker volume create uespi_postgres || true
          docker volume create livekit_data || true

# ===============================
# POSTGRES
# ===============================
      - name: PostgreSQL
        run: |
          docker rm -f uespi-postgres || true

          docker run -d \
            --name uespi-postgres \
            --restart always \
            --network uespi_net \
            -p 5432:5432 \
            -e POSTGRES_DB=uespi_connect \
            -e POSTGRES_USER=uespi_user \
            -e POSTGRES_PASSWORD=uespi123 \
            -v uespi_postgres:/var/lib/postgresql/data \
            postgres:15

# ===============================
# LIVEKIT
# ===============================
      - name: LiveKit Server
        run: |
          docker rm -f livekit || true

          docker run -d \
            --name livekit \
            --restart always \
            --network uespi_net \
            -p 7880:7880 \
            -p 7881:7881 \
            -p 7882:7882/udp \
            -v ${{ github.workspace }}/livekit.yaml:/livekit.yaml \
            livekit/livekit-server:latest \
            --config /livekit.yaml

# ===============================
# BACKEND
# ===============================
      - name: Backend
        run: |
          docker rm -f uespi-backend || true

          docker pull $DOCKERHUB_USERNAME/uespi-backend:latest

          docker run -d \
            --name uespi-backend \
            --restart always \
            --network uespi_net \
            -p 3000:3000 \
            -e NODE_ENV=production \
            -e DB_HOST=uespi-postgres \
            -e DB_PORT=5432 \
            -e DB_USER=uespi_user \
            -e DB_PASSWORD=uespi123 \
            -e DB_NAME=uespi_connect \
            $DOCKERHUB_USERNAME/uespi-backend:latest

# ===============================
# FRONTEND
# ===============================
      - name: Frontend
        run: |
          docker rm -f uespi-frontend || true

          docker pull $DOCKERHUB_USERNAME/uespi-frontend:latest

          docker run -d \
            --name uespi-frontend \
            --restart always \
            --network uespi_net \
            -p 80:80 \
            $DOCKERHUB_USERNAME/uespi-frontend:latest