<!DOCTYPE html>
<html>
<head>
    <title>Teste API - Versão Corrigida</title>
    <style>
        body { font-family: monospace; margin: 20px; background: #f5f5f5; }
        button { margin: 5px; padding: 10px; cursor: pointer; background: #4CAF50; color: white; border: none; border-radius: 4px; }
        button:hover { background: #45a049; }
        .error { color: red; }
        .success { color: green; }
        pre { background: white; padding: 10px; border-radius: 5px; overflow-x: auto; border: 1px solid #ddd; }
        .result-box { margin-top: 20px; }
        input { padding: 8px; margin: 5px; }
    </style>
</head>
<body>
    <h1>Studio Link - Teste API</h1>
    
    <div>
        <input type="text" id="username" placeholder="Usuário" value="admin">
        <input type="password" id="password" placeholder="Senha" value="admin123">
        <button onclick="login()">Login</button>
        <button onclick="checkSession()">Verificar Sessão</button>
        <button onclick="getChannels()">Listar Canais</button>
        <button onclick="getUsers()">Listar Usuários</button>
    </div>
    
    <div id="result" class="result-box"></div>
    
    <script>
        // Usando URL relativa - MESMO DOMÍNIO!
        const API_URL = '/api';
        
        function log(message, isError = false) {
            const resultDiv = document.getElementById('result');
            const color = isError ? 'error' : 'success';
            resultDiv.innerHTML += `<div class="${color}">${message}</div>`;
        }
        
        function clearLog() {
            document.getElementById('result').innerHTML = '';
        }
        
        async function login() {
            clearLog();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            log(`🔐 Tentando login como: ${username}`);
            
            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                    credentials: 'include'
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    log('✅ Login realizado com sucesso!');
                    log(`📝 Usuário: ${data.user.username}`);
                    log(`🎭 Perfil: ${data.user.role}`);
                    
                    // Verificar sessão após login
                    setTimeout(() => {
                        checkSession();
                    }, 500);
                } else {
                    log(`❌ Erro: ${data.error}`, true);
                }
            } catch (error) {
                log(`❌ Erro: ${error.message}`, true);
            }
        }
        
        async function checkSession() {
            try {
                const response = await fetch(`${API_URL}/debug-session`, {
                    credentials: 'include'
                });
                const data = await response.json();
                
                log('🔍 DEBUG SESSÃO:');
                log(`Session ID: ${data.sessionId}`);
                log(`Usuário: ${data.user ? data.user.username : 'nenhum'}`);
                log(`Cookie recebido: ${data.cookies || 'nenhum'}`);
                
                if (data.user) {
                    log('✅ Sessão autenticada com sucesso!');
                } else {
                    log('⚠️ Sessão NÃO autenticada!', true);
                }
            } catch (error) {
                log(`❌ Erro ao verificar sessão: ${error.message}`, true);
            }
        }
        
        async function getChannels() {
            try {
                const response = await fetch(`${API_URL}/channels`, {
                    credentials: 'include'
                });
                const data = await response.json();
                
                if (response.ok) {
                    log('📺 CANAIS DISPONÍVEIS:');
                    data.forEach(channel => {
                        log(`  - ${channel.title} (${channel.name}) - ${channel.mode === 'av' ? 'Áudio+Video' : channel.mode === 'audio' ? 'Só Áudio' : 'Só Video'}`);
                    });
                    log(`Total: ${data.length} canais`);
                } else {
                    log(`❌ Erro: ${data.error}`, true);
                }
            } catch (error) {
                log(`❌ Erro ao listar canais: ${error.message}`, true);
            }
        }
        
        async function getUsers() {
            try {
                const response = await fetch(`${API_URL}/admin/users`, {
                    credentials: 'include'
                });
                const data = await response.json();
                
                if (response.ok) {
                    log('👥 USUÁRIOS:');
                    data.forEach(user => {
                        log(`  - ${user.username} (${user.role}) - ${user.active ? 'Ativo' : 'Inativo'} ${user.channel ? `- Canal: ${user.channel}` : ''}`);
                    });
                    log(`Total: ${data.length} usuários`);
                } else {
                    log(`❌ Erro: ${data.error}`, true);
                }
            } catch (error) {
                log(`❌ Erro ao listar usuários: ${error.message}`, true);
            }
        }
        
        // Inicializar
        log('🔧 Teste iniciado!');
        log(`🌐 URL: ${window.location.href}`);
        log(`💡 IMPORTANTE: Você está acessando pela mesma porta que o servidor (3000)`);
        log(`✅ Isso é bom - os cookies funcionarão corretamente!`);
    </script>
</body>
</html>
