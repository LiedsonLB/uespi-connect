version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: uespi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: uespi_connect
      POSTGRES_USER: uespi_user
      POSTGRES_PASSWORD: uespi123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - studio-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uespi_user -d uespi_connect"]
      interval: 10s
      timeout: 5s
      retries: 5

  livekit:
    image: livekit/livekit-server:latest
    container_name: livekit
    restart: unless-stopped
    ports:
      - "7880:7880"           # API e WebSocket
      - "7881:7881"           # TCP (fallback)
      - "7882:7882/udp"       # UDP (WebRTC)
    environment:
      LIVEKIT_API_KEY: devkey
      LIVEKIT_API_SECRET: secret
      LIVEKIT_RTC_PORT_TCP: 7881
      LIVEKIT_RTC_PORT_UDP: 7882
      LIVEKIT_RTC_USE_EXTERNAL_IP: "true"
      LIVEKIT_RTC_STUN_SERVERS: '["stun:stun.l.google.com:19302","stun:stun1.l.google.com:19302"]'
      LIVEKIT_RTC_TURN_SERVERS: '[{"urls":["turn:openrelay.metered.ca:80","turn:openrelay.metered.ca:443"],"username":"openrelayproject","credential":"openrelayproject"}]'
    command:
      - --dev
      - --bind=0.0.0.0
    volumes:
      - ./livekit-data:/data
    networks:
      - studio-network
    depends_on:
      - postgres

  adminer:
    image: adminer:latest
    container_name: uespi-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    networks:
      - studio-network
    depends_on:
      - postgres

volumes:
  postgres_data:
    driver: local

networks:
  studio-network:
    driver: bridge